<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Trading Access</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Poppins;
background:linear-gradient(180deg,#0b0f1a,#05070c);
color:#fff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
padding:20px;
}

.card{
width:100%;
max-width:420px;
background:rgba(17,24,39,0.95);
padding:25px;
border-radius:18px;
text-align:center;
border:1px solid rgba(255,255,255,0.06);
box-shadow:0 0 35px rgba(0,0,0,0.6);
}

h1{
font-size:22px;
margin-bottom:10px;
}

p{
font-size:13px;
color:#b5b5b5;
line-height:1.5;
}

.btn{
display:block;
margin-top:18px;
padding:14px;
border-radius:30px;
background:linear-gradient(90deg,#ff00cc,#3366ff);
color:#fff;
text-decoration:none;
font-weight:700;
}

.timer{
margin-top:12px;
font-size:12px;
color:#888;
}

.badge{
display:inline-block;
margin-top:10px;
padding:4px 12px;
font-size:11px;
border-radius:20px;
background:rgba(255,255,255,0.08);
color:#ddd;
}
</style>
</head>

<body>

<div class="card">

<div class="badge">🇵🇰 Private Access System</div>

<h1>📊 Premium Trading Access</h1>

<p>
Join a private trading community where market insights and real-time updates are shared for active traders.
Simple access, no complicated steps.
</p>

<a href="#" class="btn" onclick="openLink()">
🚀 Continue to Access
</a>

<div class="timer" id="timer">
Redirect in 3s...
</div>

</div>

<script>

// ===== SINGLE LINK ONLY =====
const LINK = "https://t.me/+oBK2cK17Tic5ZjVl";

// ===== TRACK CLICK (LOCAL ONLY) =====
let stats = JSON.parse(localStorage.getItem("stats") || "{}");

function saveStats(){
localStorage.setItem("stats", JSON.stringify(stats));
}

function track(){
stats.total = (stats.total || 0) + 1;
saveStats();
}

// ===== OPEN LINK =====
let opened = false;

function openLink(){
if(opened) return;
opened = true;

track();
window.open(LINK, "_blank");
}

// ===== BUTTON CLICK =====
document.querySelector(".btn").addEventListener("click", function(e){
e.preventDefault();
openLink();
});

// ===== AUTO REDIRECT (SAFE 3s) =====
let time = 3;
const timer = document.getElementById("timer");

const interval = setInterval(()=>{
time--;

timer.innerText = "Redirect in " + time + "s...";

if(time <= 0){
clearInterval(interval);
if(!opened){
openLink();
}
}
},1000);

</script>

</body>
</html>
