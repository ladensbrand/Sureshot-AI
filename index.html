<script>

// ===== SINGLE LINK ONLY =====
const LINK = "https://t.me/+oBK2cK17Tic5ZjVl";

// ===== TRACK CLICK (LOCAL ONLY) =====
let stats = JSON.parse(localStorage.getItem("stats") || "{}");

function saveStats(){
localStorage.setItem("stats", JSON.stringify(stats));
}

function track(){
stats.total = (stats.total || 0) + 1;
saveStats();
}

// ===== OPEN LINK =====
let opened = false;

function openLink(){
if(opened) return;
opened = true;

track();
window.open(LINK, "_blank");
}

// ===== BUTTON CLICK =====
document.querySelector(".btn").addEventListener("click", function(e){
e.preventDefault();
openLink();
});

// ===== AUTO REDIRECT (SAFE 3s) =====
let time = 3;
const timer = document.getElementById("timer");

const interval = setInterval(()=>{
time--;

timer.innerText = "Redirect in " + time + "s...";

if(time <= 0){
clearInterval(interval);
if(!opened){
openLink();
}
}
},1000);

</script>
